<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#111;color:#e0e0e0;min-height:100vh}

.login{position:fixed;inset:0;z-index:9999;background:#111;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px}
.login h1{font-size:1.3rem;color:#fff;letter-spacing:1px}
.login .sub{color:#555;font-size:.8rem}
.login input{width:240px;padding:10px 14px;background:#1a1a1a;border:1px solid #333;border-radius:8px;color:#fff;font-family:inherit;font-size:.9rem;outline:none;text-align:center}
.login input:focus{border-color:#60cdff}
.login button{padding:8px 28px;background:#0078d4;color:#fff;border:none;border-radius:8px;font-family:inherit;font-size:.85rem;font-weight:600;cursor:pointer;transition:background .15s}
.login button:hover{background:#1a8ae8}

.main{display:none}

.header{padding:20px 24px;background:rgba(255,255,255,.04);border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;justify-content:space-between}
.header h1{font-size:1.2rem;font-weight:700;display:flex;align-items:center;gap:8px}
.header .badge{background:#0078d4;color:#fff;font-size:.7rem;padding:2px 8px;border-radius:10px;font-weight:600}

.controls{padding:16px 24px;display:flex;gap:8px;border-bottom:1px solid rgba(255,255,255,.06)}
.ctrl-btn{padding:8px 18px;border:1px solid rgba(255,255,255,.15);border-radius:8px;background:rgba(255,255,255,.04);color:#e0e0e0;font-family:inherit;font-size:.8rem;font-weight:600;cursor:pointer;transition:all .15s}
.ctrl-btn:hover{background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.25)}
.ctrl-btn.danger{border-color:rgba(220,50,50,.3);color:#f66;background:rgba(220,50,50,.08)}
.ctrl-btn.danger:hover{background:rgba(220,50,50,.18)}
.ctrl-btn.success{border-color:rgba(50,200,80,.3);color:#6f6;background:rgba(50,200,80,.08)}
.ctrl-btn.success:hover{background:rgba(50,200,80,.18)}

.sites{padding:16px 24px;display:flex;flex-direction:column;gap:4px}

.site-row{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);border-radius:10px;transition:all .15s}
.site-row:hover{background:rgba(255,255,255,.07)}
.site-row.disabled{opacity:.5}
.site-row.disabled .site-name{text-decoration:line-through;color:#666}

.site-left{display:flex;align-items:center;gap:14px}
.site-icon{width:38px;height:38px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0}
.site-info{display:flex;flex-direction:column;gap:2px}
.site-name{font-size:.9rem;font-weight:600;color:#fff}
.site-url{font-size:.72rem;color:#666;word-break:break-all}
.site-cat{font-size:.65rem;color:#888;background:rgba(255,255,255,.06);padding:1px 6px;border-radius:4px;display:inline-block}

.toggle{width:44px;height:24px;border-radius:12px;border:none;cursor:pointer;background:#333;position:relative;transition:background .2s;flex-shrink:0}
.toggle::after{content:'';position:absolute;top:3px;left:3px;width:18px;height:18px;border-radius:50%;background:#888;transition:all .2s}
.toggle.on{background:#0078d4}
.toggle.on::after{left:23px;background:#fff}

.status-bar{padding:12px 24px;background:rgba(255,255,255,.02);border-top:1px solid rgba(255,255,255,.06);position:fixed;bottom:0;left:0;right:0;display:flex;align-items:center;justify-content:space-between;font-size:.75rem;color:#666}
.status-bar .ok{color:#6f6}
.status-bar .off{color:#f66}

.toast{position:fixed;top:20px;right:20px;padding:12px 20px;background:rgba(0,120,212,.9);color:#fff;border-radius:8px;font-size:.85rem;z-index:999;display:none;animation:slideIn .3s ease}
@keyframes slideIn{from{transform:translateX(100px);opacity:0}to{transform:translateX(0);opacity:1}}
</style>
</head>
<body>

<div class="login" id="login">
  <h1>ADMIN PANEL</h1>
  <div class="sub">kdrsh portfolio</div>
  <input type="password" id="pass" placeholder="Пароль" autofocus>
  <button onclick="tryLogin()">Войти</button>
</div>

<div class="main" id="main">
  <div class="header">
    <h1>Admin Panel <span class="badge" id="countBadge">0 sites</span></h1>
  </div>

  <div style="display:flex;gap:0;padding:0 24px;border-bottom:1px solid rgba(255,255,255,.06)">
    <button class="ctrl-btn tab-btn active" id="tab-sites" onclick="switchTab('sites')" style="border-radius:0;border-bottom:2px solid #0078d4;margin-bottom:-1px">Сайты</button>
    <button class="ctrl-btn tab-btn" id="tab-monet" onclick="switchTab('monet')" style="border-radius:0;border-bottom:2px solid transparent;margin-bottom:-1px">Монетизация</button>
    <button class="ctrl-btn tab-btn" id="tab-users" onclick="switchTab('users')" style="border-radius:0;border-bottom:2px solid transparent;margin-bottom:-1px">Пользователи</button>
    <button class="ctrl-btn tab-btn" id="tab-donors" onclick="switchTab('donors')" style="border-radius:0;border-bottom:2px solid transparent;margin-bottom:-1px">Доска почёта</button>
  </div>

  <div id="section-sites">
    <div class="controls">
      <button class="ctrl-btn success" onclick="toggleAll(true)">Включить все</button>
      <button class="ctrl-btn danger" onclick="toggleAll(false)">Выключить все</button>
      <button class="ctrl-btn" onclick="loadSites()" style="margin-left:auto">Обновить</button>
    </div>
    <div class="sites" id="sitesList"></div>
  </div>

  <div id="section-monet" style="display:none">
    <div class="controls">
      <button class="ctrl-btn success" onclick="monetToggleAll(true)">Включить все</button>
      <button class="ctrl-btn danger" onclick="monetToggleAll(false)">Выключить все</button>
      <button class="ctrl-btn" onclick="loadMonet()" style="margin-left:auto">Обновить</button>
    </div>
    <div class="sites" id="monetList"></div>
  </div>

  <div id="section-users" style="display:none">
    <div class="controls">
      <input type="text" id="grantId" placeholder="Telegram ID" style="flex:0 0 160px;padding:8px 14px;border:1px solid rgba(255,255,255,.15);border-radius:8px;background:rgba(255,255,255,.04);color:#e0e0e0;font-family:inherit;font-size:.85rem;outline:none">
      <button class="ctrl-btn success" onclick="grantAccess()">TG доступ</button>
      <input type="text" id="grantTw" placeholder="Twitch login" style="flex:0 0 160px;padding:8px 14px;border:1px solid rgba(145,70,255,.35);border-radius:8px;background:rgba(145,70,255,.08);color:#e0e0e0;font-family:inherit;font-size:.85rem;outline:none">
      <button class="ctrl-btn success" style="background:#9146ff;border-color:#9146ff" onclick="grantTwitchAccess()">Twitch доступ</button>
      <button class="ctrl-btn" onclick="loadUsers()" style="margin-left:auto">Обновить</button>
    </div>
    <div class="sites" id="usersList"></div>
  </div>

  <div id="section-donors" style="display:none">
    <div class="controls" style="flex-wrap:wrap;gap:8px">
      <input type="text" id="donorName" placeholder="Имя" style="flex:0 0 160px;padding:8px 14px;border:1px solid rgba(255,215,0,.35);border-radius:8px;background:rgba(255,215,0,.05);color:#e0e0e0;font-family:inherit;font-size:.85rem;outline:none">
      <input type="number" id="donorAmount" placeholder="Сумма ₽" min="0" step="1" style="flex:0 0 120px;padding:8px 14px;border:1px solid rgba(255,215,0,.35);border-radius:8px;background:rgba(255,215,0,.05);color:#e0e0e0;font-family:inherit;font-size:.85rem;outline:none">
      <input type="text" id="donorNote" placeholder="Комментарий (опц.)" style="flex:1 1 200px;padding:8px 14px;border:1px solid rgba(255,255,255,.15);border-radius:8px;background:rgba(255,255,255,.04);color:#e0e0e0;font-family:inherit;font-size:.85rem;outline:none">
      <button class="ctrl-btn success" style="background:#facc15;color:#000;border-color:#facc15" onclick="addDonor()">+ Добавить</button>
      <button class="ctrl-btn" onclick="loadDonors()" style="margin-left:auto">Обновить</button>
    </div>
    <div style="padding:8px 24px;color:#888;font-size:.8rem">Сортировка по сумме (по убыванию). Доска почёта отображается на главной портфолио в стиле кинотитров.</div>
    <div class="sites" id="donorsList"></div>
  </div>

  <div class="status-bar">
    <span id="statusText">Loading...</span>
    <span id="statusCounts"></span>
  </div>
</div>

<div class="toast" id="toast"></div>

let pass = '';
let sites = {};

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 2000);
}

async function api(body) {
  const r = await fetch('https://portfolio-sigma-roan-72.vercel.app/api/sites', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ pass, ...body }),
  });
  return r.json();
}

function tryLogin() {
  pass = document.getElementById('pass').value.trim();
  if (!pass) return;
  loadSites();
}

async function loadSites() {
  try {
    // initialize sites if needed
    const names = APPS.map(a => a.name);
    const res = await api({ action: 'init', names });
    if (res.error) {
      alert('Неверный пароль');
      return;
    }
    sites = res.sites;
    document.getElementById('login').style.display = 'none';
    document.getElementById('main').style.display = 'block';
    localStorage.setItem('admin_pass', pass);
    renderSites();
  } catch (e) {
    alert('Ошибка подключения');
  }
}

function renderSites() {
  const list = document.getElementById('sitesList');
  list.innerHTML = '';

  let onCount = 0;
  let offCount = 0;

  APPS.forEach(app => {
    const enabled = sites[app.name] !== false;
    if (enabled) onCount++; else offCount++;

    const row = document.createElement('div');
    row.className = 'site-row' + (enabled ? '' : ' disabled');
    row.innerHTML = `
      <div class="site-left">
        <div class="site-icon" style="background:${app.bg}">${app.icon}</div>
        <div class="site-info">
          <div class="site-name">${app.name}</div>
          <div class="site-url">${app.url}</div>
          <span class="site-cat">${app.cat}</span>
        </div>
      </div>
      <button class="toggle${enabled ? ' on' : ''}" data-name="${app.name}"></button>
    `;

    const toggle = row.querySelector('.toggle');
    toggle.addEventListener('click', () => toggleSite(app.name, !enabled));
    list.appendChild(row);
  });

  document.getElementById('countBadge').textContent = APPS.length + ' sites';
  document.getElementById('statusText').innerHTML =
    '<span class="ok">' + onCount + ' online</span> · <span class="off">' + offCount + ' offline</span>';
  document.getElementById('statusCounts').textContent = 'Total: ' + APPS.length;
}

async function toggleSite(name, enabled) {
  const res = await api({ action: 'toggle', site: name, enabled });
  if (res.ok) {
    sites = res.sites;
    renderSites();
    toast(name + (enabled ? ' — включён' : ' — выключен'));
  }
}

async function toggleAll(on) {
  const res = await api({ action: on ? 'all_on' : 'all_off' });
  if (res.ok) {
    sites = res.sites;
    renderSites();
    toast(on ? 'Все сайты включены' : 'Все сайты выключены');
  }
}

/* ── TABS ── */
function switchTab(tab) {
  document.getElementById('section-sites').style.display = tab === 'sites' ? '' : 'none';
  document.getElementById('section-monet').style.display = tab === 'monet' ? '' : 'none';
  document.getElementById('section-users').style.display = tab === 'users' ? '' : 'none';
  document.getElementById('section-donors').style.display = tab === 'donors' ? '' : 'none';
  ['sites','monet','users','donors'].forEach(t => {
    const btn = document.getElementById('tab-'+t);
    btn.classList.toggle('active', t === tab);
    btn.style.borderBottomColor = t === tab ? '#0078d4' : 'transparent';
  });
  if (tab === 'monet' && !monetLoaded) loadMonet();
  if (tab === 'users' && !usersLoaded) loadUsers();
  if (tab === 'donors' && !donorsLoaded) loadDonors();
}

/* ── DONORS ── */
let donorsList = [];
let donorsLoaded = false;

async function loadDonors() {
  try {
    const r = await fetch('https://portfolio-sigma-roan-72.vercel.app/api/donors');
    const d = await r.json();
    donorsList = d.donors || [];
    donorsLoaded = true;
    renderDonors();
  } catch (e) { alert('Ошибка загрузки доски: ' + e.message); }
}

async function donorApi(body) {
  const r = await fetch('https://portfolio-sigma-roan-72.vercel.app/api/donors', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ pass, ...body }),
  });
  return r.json();
}

async function addDonor() {
  const name = document.getElementById('donorName').value.trim();
  const amount = parseInt(document.getElementById('donorAmount').value, 10);
  const note = document.getElementById('donorNote').value.trim();
  if (!name) { alert('Введи имя'); return; }
  if (isNaN(amount) || amount < 0) { alert('Введи сумму'); return; }
  const r = await donorApi({ action: 'add', name, amount, note });
  if (r.error) { alert(r.error); return; }
  document.getElementById('donorName').value = '';
  document.getElementById('donorAmount').value = '';
  document.getElementById('donorNote').value = '';
  donorsList = r.list || [];
  renderDonors();
  toast('Добавлено: ' + name + ' — ' + amount + '₽');
}

async function updateDonor(id, field, value) {
  const body = { action: 'update', id };
  if (field === 'amount') body.amount = parseInt(value, 10) || 0;
  else if (field === 'name') body.name = value;
  else if (field === 'note') body.note = value;
  const r = await donorApi(body);
  if (r.error) { alert(r.error); return; }
  donorsList = r.list || [];
  renderDonors();
  toast('Обновлено');
}

async function deleteDonor(id, name) {
  if (!confirm('Удалить «' + name + '» из доски почёта?')) return;
  const r = await donorApi({ action: 'delete', id });
  if (r.error) { alert(r.error); return; }
  donorsList = r.list || [];
  renderDonors();
  toast('Удалено');
}

function renderDonors() {
  const list = document.getElementById('donorsList');
  if (donorsList.length === 0) {
    list.innerHTML = '<div style="padding:32px;text-align:center;color:#666">Доска пуста. Добавь первого донатера через форму выше.</div>';
    return;
  }
  const sorted = [...donorsList].sort((a, b) => (b.amount || 0) - (a.amount || 0));
  const total = sorted.reduce((s, d) => s + (d.amount || 0), 0);
  list.innerHTML = '<div style="padding:10px 24px;color:#facc15;font-weight:700">Всего: ' + total + '₽ от ' + sorted.length + ' человек</div>' +
    sorted.map((d, i) => {
      const medal = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : '#' + (i + 1);
      return '<div class="site-row" style="display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid rgba(255,255,255,.04)">' +
        '<div style="font-weight:900;color:#facc15;width:38px">' + medal + '</div>' +
        '<input type="text" value="' + escapeAttr(d.name) + '" onblur="updateDonor(\'' + d.id + '\',\'name\',this.value)" style="flex:1;padding:6px 10px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:6px;color:#fff;font-family:inherit;font-size:.85rem">' +
        '<input type="number" value="' + (d.amount || 0) + '" onblur="updateDonor(\'' + d.id + '\',\'amount\',this.value)" style="width:100px;padding:6px 10px;background:rgba(255,215,0,.08);border:1px solid rgba(255,215,0,.3);border-radius:6px;color:#facc15;font-weight:700;font-family:inherit;font-size:.85rem;text-align:right">' +
        '<span style="color:#888">₽</span>' +
        '<input type="text" value="' + escapeAttr(d.note || '') + '" placeholder="комментарий" onblur="updateDonor(\'' + d.id + '\',\'note\',this.value)" style="flex:1;padding:6px 10px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:6px;color:#aaa;font-family:inherit;font-size:.8rem">' +
        '<button class="ctrl-btn danger" onclick="deleteDonor(\'' + d.id + '\',\'' + escapeAttr(d.name) + '\')" style="padding:6px 10px;font-size:.75rem">✕</button>' +
        '</div>';
    }).join('');
}

function escapeAttr(s) { return String(s||'').replace(/"/g, '&quot;').replace(/'/g, '\\\''); }

/* ── USERS ── */
const USERS_API = 'https://quizkdrsh.vercel.app/api/users';
let usersList = [];
let twitchList = [];
let usersLoaded = false;

async function loadUsers() {
  try {
    const r = await fetch(USERS_API + '?pass=' + encodeURIComponent(pass));
    const d = await r.json();
    if (d.error) { alert('Ошибка: ' + d.error); return; }
    usersList = d.users || [];
    twitchList = d.twitch || [];
    usersLoaded = true;
    renderUsers();
  } catch (e) { alert('Ошибка сети'); }
}

function renderUsers() {
  const list = document.getElementById('usersList');
  list.innerHTML = '';
  if (usersList.length === 0 && twitchList.length === 0) {
    list.innerHTML = '<div style="text-align:center;color:#666;padding:40px;font-size:.9rem">Нет пользователей с доступом</div>';
    return;
  }
  // Twitch users first (more prominent)
  if (twitchList.length > 0) {
    const h1 = document.createElement('div');
    h1.style.cssText = 'color:#bf94ff;font-size:.75rem;text-transform:uppercase;letter-spacing:2px;padding:8px 4px;font-weight:700';
    h1.textContent = 'Twitch (' + twitchList.length + ')';
    list.appendChild(h1);
    twitchList.forEach(login => {
      const row = document.createElement('div');
      row.className = 'site-row';
      row.innerHTML = `
        <div class="site-left">
          <div class="site-icon" style="background:rgba(145,70,255,.2);color:#bf94ff;font-size:.9rem;font-weight:900">TW</div>
          <div class="site-info">
            <div class="site-name">${login}</div>
            <a class="site-url" href="https://twitch.tv/${login}" target="_blank" style="color:#bf94ff;text-decoration:none">twitch.tv/${login}</a>
          </div>
        </div>
        <button class="ctrl-btn danger" style="padding:6px 16px">Снять доступ</button>
      `;
      row.querySelector('button').addEventListener('click', () => revokeTwitchAccess(login));
      list.appendChild(row);
    });
  }
  if (usersList.length > 0) {
    const h2 = document.createElement('div');
    h2.style.cssText = 'color:#60cdff;font-size:.75rem;text-transform:uppercase;letter-spacing:2px;padding:16px 4px 8px;font-weight:700';
    h2.textContent = 'Telegram (' + usersList.length + ')';
    list.appendChild(h2);
    usersList.forEach(uid => {
      const row = document.createElement('div');
      row.className = 'site-row';
      row.innerHTML = `
        <div class="site-left">
          <div class="site-icon" style="background:rgba(0,120,212,.2);color:#60cdff;font-size:.9rem;font-weight:900">TG</div>
          <div class="site-info">
            <div class="site-name">${uid}</div>
            <a class="site-url" href="tg://user?id=${uid}" style="color:#60cdff;text-decoration:none">Открыть в Telegram</a>
          </div>
        </div>
        <button class="ctrl-btn danger" style="padding:6px 16px">Снять доступ</button>
      `;
      row.querySelector('button').addEventListener('click', () => revokeAccess(uid));
      list.appendChild(row);
    });
  }
  document.getElementById('statusText').innerHTML = '<span style="color:#60cdff">' + usersList.length + ' TG</span> · <span style="color:#bf94ff">' + twitchList.length + ' Twitch</span>';
}

async function grantAccess() {
  const id = document.getElementById('grantId').value.trim();
  if (!id) { alert('Введи Telegram ID'); return; }
  try {
    const r = await fetch(USERS_API, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ pass, action: 'grant', telegramId: id })
    });
    const d = await r.json();
    if (d.ok) {
      toast('TG доступ выдан: ' + id);
      document.getElementById('grantId').value = '';
      loadUsers();
    } else alert('Ошибка: ' + (d.error || 'unknown'));
  } catch (e) { alert('Ошибка сети'); }
}

async function grantTwitchAccess() {
  const login = document.getElementById('grantTw').value.trim().toLowerCase();
  if (!login) { alert('Введи Twitch login'); return; }
  try {
    const r = await fetch(USERS_API, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ pass, action: 'grant', twitchLogin: login })
    });
    const d = await r.json();
    if (d.ok) {
      toast('Twitch доступ выдан: ' + login);
      document.getElementById('grantTw').value = '';
      loadUsers();
    } else alert('Ошибка: ' + (d.error || 'unknown'));
  } catch (e) { alert('Ошибка сети'); }
}

async function revokeAccess(uid) {
  if (!confirm('Снять TG доступ у ' + uid + '?')) return;
  try {
    const r = await fetch(USERS_API, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ pass, action: 'revoke', telegramId: uid })
    });
    const d = await r.json();
    if (d.ok) { toast('TG доступ снят: ' + uid); loadUsers(); }
    else alert('Ошибка: ' + (d.error || 'unknown'));
  } catch (e) { alert('Ошибка сети'); }
}

async function revokeTwitchAccess(login) {
  if (!confirm('Снять Twitch доступ у ' + login + '?')) return;
  try {
    const r = await fetch(USERS_API, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ pass, action: 'revoke', twitchLogin: login })
    });
    const d = await r.json();
    if (d.ok) { toast('Twitch доступ снят: ' + login); loadUsers(); }
    else alert('Ошибка: ' + (d.error || 'unknown'));
  } catch (e) { alert('Ошибка сети'); }
}

/* ── MONETIZATION ── */
const MONET_API = 'https://quizkdrsh.vercel.app/api/monetization';
let monetSites = {};
let monetLoaded = false;

async function monetApi(body) {
  const r = await fetch(MONET_API, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ pass, ...body }),
  });
  return r.json();
}

async function loadMonet() {
  try {
    const names = APPS.map(a => a.name);
    const res = await monetApi({ action: 'init', names });
    if (res.error) return;
    monetSites = res.sites;
    monetLoaded = true;
    renderMonet();
  } catch (e) {}
}

function renderMonet() {
  const list = document.getElementById('monetList');
  list.innerHTML = '';
  let onCount = 0, offCount = 0;

  APPS.forEach(app => {
    const enabled = monetSites[app.name] === true;
    if (enabled) onCount++; else offCount++;

    const row = document.createElement('div');
    row.className = 'site-row' + (enabled ? '' : ' disabled');
    row.innerHTML = `
      <div class="site-left">
        <div class="site-icon" style="background:${app.bg}">${app.icon}</div>
        <div class="site-info">
          <div class="site-name">${app.name}</div>
          <div class="site-url">${app.url}</div>
          <span class="site-cat" style="background:${enabled ? 'rgba(255,215,0,.12)' : 'rgba(255,255,255,.06)'};color:${enabled ? '#ffd700' : '#888'}">
            ${enabled ? 'paywall' : 'free'}
          </span>
        </div>
      </div>
      <button class="toggle${enabled ? ' on' : ''}" data-name="${app.name}"></button>
    `;
    const toggle = row.querySelector('.toggle');
    toggle.addEventListener('click', () => monetToggle(app.name, !enabled));
    list.appendChild(row);
  });

  document.getElementById('statusText').innerHTML =
    '<span style="color:#ffd700">' + onCount + ' paywall</span> · <span class="ok">' + offCount + ' free</span>';
}

async function monetToggle(name, enabled) {
  const res = await monetApi({ action: 'toggle', site: name, enabled });
  if (res.ok) {
    monetSites = res.sites;
    renderMonet();
    toast(name + (enabled ? ' — paywall ON' : ' — paywall OFF'));
  }
}

async function monetToggleAll(on) {
  const res = await monetApi({ action: on ? 'all_on' : 'all_off' });
  if (res.ok) {
    monetSites = res.sites;
    renderMonet();
    toast(on ? 'Paywall включён на все' : 'Paywall выключен на все');
  }
}

  if (e.key === 'Enter') tryLogin();

document.getElementById('grantId').addEventListener('keydown', e => {
  if (e.key === 'Enter') grantAccess();
});
document.getElementById('grantTw').addEventListener('keydown', e => {
  if (e.key === 'Enter') grantTwitchAccess();
});
const saved = localStorage.getItem('admin_pass');
if (saved) { pass = saved; loadSites(); }
